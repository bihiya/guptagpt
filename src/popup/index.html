<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capture Studio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="panel">
      <section class="hero">
        <div class="badge">Page Capture</div>
        <h1>Capture Studio</h1>
        <p>Save the tab photo, full HTML, and source code in one click.</p>
        <button id="captureBtn" class="capture-button" type="button">
          <span aria-hidden="true">●</span>
          Capture current tab
        </button>
      </section>

      <section class="card">
        <div class="section-title">
          <span>Connection</span>
          <small>Sync settings</small>
        </div>

        <label>
          Auto-mode interval (ms)
          <input id="intervalMs" type="number" min="5000" step="1000" />
        </label>

        <label class="toggle-row">
          <input id="metadataOnlyMode" type="checkbox" />
          <span><strong>Metadata-only mode</strong><small>Skip screenshot/html for lighter uploads.</small></span>
        </label>

        <label>
          Max HTML size (bytes)
          <input id="maxHtmlSizeBytes" type="number" min="10000" step="5000" />
        </label>

        <label class="toggle-row">
          <input id="autoModeEnabled" type="checkbox" />
          <span>
            <strong>Auto-mode</strong>
            <small>Capture on a repeating schedule.</small>
          </span>
        </label>

        <button id="saveBtn" class="save-button">Save settings</button>

        <div id="authSummary" class="auth-summary">
          <strong id="authGreeting">Hello, Guest</strong>
          <small id="authEmail">Not logged in</small>
        </div>
        <small id="pendingUploads">Pending uploads: 0</small>
        <small id="lastSuccessAt">Last success: —</small>
        <small id="lastError">Last error: —</small>

        <button id="retryBtn" class="save-button" type="button">Retry pending uploads</button>
        <button id="healthBtn" class="save-button" type="button">Health check</button>
        <small id="healthStatus">Health: not checked</small>

        <button id="logoutBtn" class="logout-button" type="button">Logout</button>
      </section>

      <p id="status" class="status" role="status">Ready to capture.</p>
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>
