<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capture Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Capture Settings</h1>
      <label>
        Backend Base URL
        <input id="backendBaseUrl" type="url" placeholder="https://api.example.com" />
      </label>

      <label>
        Auth Token (Bearer)
        <input id="authToken" type="password" placeholder="paste JWT token" />
      </label>

      <label>
        Auto-mode interval (ms)
        <input id="intervalMs" type="number" min="5000" step="1000" />
      </label>

      <label class="inline">
        <input id="autoModeEnabled" type="checkbox" />
        Enable auto-mode
      </label>

      <div class="actions">
        <button id="saveBtn">Save</button>
        <button id="captureBtn" type="button">Capture Now</button>
      </div>
      <p id="status" role="status"></p>
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>
