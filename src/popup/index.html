<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Capture</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Smart Capture</h1>
      <p class="subtitle">Capture active tab to backend in one click.</p>

      <label>
        Backend URL
        <input id="backendBaseUrl" type="url" placeholder="https://api.example.com" />
      </label>

      <div class="grid">
        <label>
          Interval (ms)
          <input id="intervalMs" type="number" min="5000" step="1000" />
        </label>
        <label class="toggle">
          <input id="autoModeEnabled" type="checkbox" />
          Auto mode
        </label>
      </div>

      <div class="actions">
        <button id="saveBtn">Save</button>
        <button id="captureBtn" class="primary" type="button">Capture Now</button>
      </div>
      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>
